// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('com.google.gms:google-services:4.4.4')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    maven {
      // Mentra SDK stages its pinned Sherpa-ONNX AAR here.
      def mentraBluetoothSdkRoot = new File(
        ["node", "--print", "require.resolve('@mentra/bluetooth-sdk/package.json', { paths: [rootDir.getParent()] })"].execute(null, rootDir).text.trim()
      ).getParentFile()
      url = uri(new File(mentraBluetoothSdkRoot, "android/libs/maven"))
    }
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
